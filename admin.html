<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f8fafc;
            --muted: #94a3b8;
            --success: #22c55e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        .header {
            margin-bottom: 20px;
            text-align: center;
        }

        .tabs {
            display: flex;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 5px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .user-detail {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .user-step {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .broadcast-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 12px;
            box-sizing: border-box;
            font-family: inherit;
            resize: none;
            margin-bottom: 15px;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-success {
            background: var(--success);
        }

        .loader {
            text-align: center;
            padding: 50px;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div id="loading" class="loader">Получение данных...</div>

    <div id="content" style="display: none;">
        <div class="header">
            <h1 style="font-size: 1.3rem; margin: 0;">Центр управления</h1>
            <p style="color: var(--muted); font-size: 0.8rem;">Аккаунт: Денис</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('stats')">📊 Сводка</button>
            <button class="tab-btn" onclick="showTab('broadcast')">📢 Рассылка</button>
        </div>

        <!-- STATS TAB -->
        <div id="tab-stats" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <span id="total-users" class="stat-value">0</span>
                    <span class="stat-label">Всего</span>
                </div>
                <div class="stat-card">
                    <span id="registered-users" class="stat-value">0</span>
                    <span class="stat-label">Лиды</span>
                </div>
                <div class="stat-card">
                    <span id="completed-games" class="stat-value">0</span>
                    <span class="stat-label">Прошли</span>
                </div>
                <div class="stat-card">
                    <span id="conv-rate" class="stat-value">0%</span>
                    <span class="stat-label">Конверсия</span>
                </div>
            </div>

            <div class="section-title">🕒 Недавние пользователи</div>
            <div id="user-list" class="user-list"></div>
            <button class="btn" style="margin-top: 20px;" onclick="location.reload()">Обновить данные</button>
        </div>

        <!-- BROADCAST TAB -->
        <div id="tab-broadcast" class="tab-content">
            <div class="broadcast-box">
                <div class="section-title">Написать всем (Рассылка)</div>
                <textarea id="broadcast-text"
                    placeholder="Введите текст сообщения для всех пользователей бота..."></textarea>
                <button class="btn btn-success" onclick="sendBroadcast()">🚀 Запустить рассылку</button>
                <p style="font-size: 0.75rem; color: var(--muted); margin-top: 15px; text-align: center;">
                    ⚠️ Сообщение будет мгновенно отправлено всем пользователям из базы данных.
                </p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');

        if (rawData) {
            try {
                const data = JSON.parse(decodeURIComponent(rawData));
                renderDashboard(data);
            } catch (e) {
                document.getElementById('loading').innerText = 'Ошибка загрузки данных';
            }
        } else {
            document.getElementById('loading').innerText = 'Данные не получены';
        }

        function renderDashboard(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            document.getElementById('total-users').innerText = data.total;
            document.getElementById('registered-users').innerText = data.registered;
            document.getElementById('completed-games').innerText = data.completed;

            const rate = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;
            document.getElementById('conv-rate').innerText = rate + '%';

            const listCont = document.getElementById('user-list');
            listCont.innerHTML = '';

            data.recent.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">${user.name}</span>
                        <span class="user-detail">${user.username} | ${user.school}</span>
                    </div>
                    <div class="user-step">Этап: ${user.step}</div>
                `;
                listCont.appendChild(div);
            });
        }

        function sendBroadcast() {
            const text = document.getElementById('broadcast-text').value.trim();
            if (!text) {
                tg.showAlert('Пожалуйста, введите текст сообщения.');
                return;
            }

            tg.showConfirm('Вы уверены, что хотите запустить рассылку по всем пользователям?', (ok) => {
                if (ok) {
                    const data = {
                        type: 'broadcast',
                        text: text
                    };
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                }
            });
        }
    </script>
</body>

</html>
